<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cheska</title>
    <link rel="stylesheet" href="style.css"> 
    <link rel="icon" href="/images/favicon.png">
    <audio id="bg-music" src="music/birthday.mp3" loop autoplay></audio>

    <script>
        const music = document.getElementById('bg-music');

        document.addEventListener('click', () => {
            music.play();
        }, { once: true});

        window.addEventListener('load', () => {
            const duration = 90000000; // how long in milliseconds
            const end = Date.now() + duration;

            const frame = () => {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 } // left side
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 } // right side
                });

                confetti({
                    particleCount: 5,
                    angle: 90,
                    spread: 100,
                    origin: { x: 0.5, y: 1 } // center bottom side
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            };

            frame();
        });

    </script>
</head>

<body>
    <main>
        <div class="cheska-cont">
            <img src="images/wave.png" class="wave-bg">
            <img src="images/board.png" class="board-overlay">
        </div>

        <div class="greeting-cont">
            <img src="images/happy.png" class="happy-img">
            <img src="images/birthday.png" class="birthday-img">
            <img src="images/cheska.png" class="cheska-img">
        </div>
    </main>
</body>
</html>
